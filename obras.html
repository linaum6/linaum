<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obras | Catalina Ulloa Mujica</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:white;
font-family:'Manrope',sans-serif;
color:#202020;

}

/*=========================
MENÚ
=========================*/

header{

padding:40px 0 30px;

display:flex;

justify-content:center;

}

.nav{

display:flex;

gap:55px;

}

.nav a,
.nav span{

position:relative;

text-decoration:none;

color:#202020;

font-size:.9rem;

letter-spacing:.08em;

transition:.3s;

}

.nav a::after,
.nav span::after{

content:"";

position:absolute;

left:0;

bottom:-7px;

width:0;

height:2px;

background:#B95D3F;

transition:.35s;

}

.nav a:hover{

color:#B95D3F;

}

.nav a:hover::after{

width:100%;

}

.nav .active{

color:#B95D3F;

font-weight:600;

cursor:default;

}

.nav .active::after{

width:100%;

}

/*=========================
GALERÍA
=========================*/

.gallery{

    width:min(1400px,92%);

    margin:45px auto 0;

    padding-bottom:60px;

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:55px 40px;

}

.obra{

text-decoration:none;

color:#202020;

}

.obra img{

    width:100%;

    aspect-ratio:3/2;

    object-fit:cover;

    display:block;

    transition:.35s ease;

    box-shadow:0 0 0 rgba(0,0,0,0);

}
.obra:hover img{

transform:scale(1.05);

box-shadow:0 12px 30px rgba(0,0,0,.18);

}

.titulo{

    font-family:"abigate desgo italic.otf", serif;
    
    margin-top:16px;

    text-align:center;

    font-size:1rem;

    font-style:italic;

    font-weight:400;

    line-height:1.5;

    color:#202020;

}
    
   /*=========================
FOOTER
=========================*/

footer{

    width:100%;

    text-align:center;

    padding:70px 20px 35px;

    font-size:.75rem;

    font-weight:300;

    letter-spacing:.12em;

    color:#B8B8B8;

}
   
/*=========================
RESPONSIVE
=========================*/

@media(max-width:1000px){

.gallery{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:650px){


.nav{

gap:20px;

flex-wrap:wrap;

justify-content:center;

padding:0 20px;

}

.gallery{

grid-template-columns:1fr;

gap:35px;

}

}

.fracciones{

    object-position:80% center;

}
</style>

</head>

<body>

<header>

<nav class="nav">

<a href="index.html">Inicio</a>

<span class="active">Obras</span>

<a href="exposiciones.html">Exposiciones</a>

<a href="estudios.html">Estudios</a>

<a href="artista.html">Artista</a>

</nav>

</header>

<section class="gallery">

<a href="#" class="obra">
<img src="51.jpg" alt="90'20">
<p class="titulo">90'20</p>
</a>

<a href="#" class="obra">
<img src="pelado5.jpg" alt="Pelado">
<p class="titulo">Pelado</p>
</a>

<a href="#" class="obra">
<img src="afect1.jpg" alt="Afectáme I">
<p class="titulo">Afectáme I</p>
</a>

<a href="#" class="obra">
<img src="afectII2.jpg" alt="Afectáme II">
<p class="titulo">Afectáme II</p>
</a>

<a href="#" class="obra">
<img src="susurro2.jpg" alt="Entre los gritos dispersos del color y el susurro inconstante de la forma">
<p class="titulo">Entre los gritos dispersos del color y el susurro inconstante de la forma</p>
</a>

<a href="#" class="obra">
<img src="abierto1.jpg" alt="Abierto/Cerrado">
<p class="titulo">Abierto/Cerrado</p>
</a>

<a href="#" class="obra">
<img src="escape3.jpg" alt="Escape">
<p class="titulo">Escape</p>
</a>

<a href="#" class="obra">
<img src="fraccion10.jpg" alt="F(r)acciones" class="fracciones">
<p class="titulo">F(r)acciones</p>
</a>


</section>

<footer>

    Catalina Ulloa Mujica · Artista Visual

</footer>
  
</body>

</html>
