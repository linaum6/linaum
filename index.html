<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalina Ulloa Mujica</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

background:white;

font-family:'Manrope',sans-serif;

color:#202020;

}



/* =====================
CABECERA
===================== */


.header{

height:38vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

background:white;

}



/* Nombre */


h1{

font-family:'Cormorant Garamond',serif;

font-size:clamp(3rem,5vw,5rem);

font-weight:500;

letter-spacing:.03em;


opacity:0;

animation:fadeDown 1.2s ease forwards;

}




/* Linaum */


.alias{


margin-top:10px;


font-size:.9rem;


letter-spacing:.35em;


text-transform:uppercase;


color:#252321;


opacity:0;


animation:fadeDown 1.2s ease .35s forwards;


}



/* =====================
MENU
===================== */


.nav{


margin-top:45px;


display:flex;


gap:55px;


opacity:0;


animation:fadeDown 1.2s ease .7s forwards;


}



.nav a{


position:relative;


text-decoration:none;


color:#202020;


font-size:.95rem;


letter-spacing:.08em;


}



.nav a::after{


content:"";


position:absolute;


left:0;


bottom:-8px;


width:0;


height:2px;


background:#B95D3F;


transition:.35s ease;


}



.nav a:hover{


color:#B95D3F;


}



.nav a:hover::after{


width:100%;


}




/* =====================
IMAGEN
===================== */


.hero-image{


width:100%;

height:62vh;

overflow:hidden;


}



.hero-image img{


width:100%;


height:100%;


object-fit:cover;


display:block;


}




/* =====================
ANIMACIONES
===================== */


@keyframes fadeDown{


from{


opacity:0;

transform:translateY(-25px);


}



to{


opacity:1;

transform:translateY(0);


}


}





/* =====================
RESPONSIVE
===================== */


@media(max-width:700px){


.header{


height:45vh;


}



h1{


font-size:2.8rem;


}


.nav{


gap:20px;

flex-wrap:wrap;

justify-content:center;

padding:0 20px;


}



.nav a{


font-size:.85rem;


}



.hero-image{


height:55vh;


}


}



</style>


</head>



<body>



<header class="header">


<h1>

Catalina<br>
Ulloa Mujica

</h1>



<p class="alias">

linaum

</p>




<nav class="nav">


<a href="obras.html">Obras</a>

<a href="exposiciones.html">Exposiciones</a>

<a href="estudios.html">Estudios</a>

<a href="artista.html">Artista</a>


</nav>



</header>




<section class="hero-image">


<img src="portada.jpg" alt="Obra de Catalina Ulloa Mujica">


</section>



</body>


</html>
