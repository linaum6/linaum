<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalina Ulloa Mujica</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

background:rgb(255,84,92);

font-family:'Manrope',sans-serif;

color:#241F1F;

height:100vh;

overflow:hidden;

}



/* =====================
CONTENEDOR GENERAL
===================== */


.portfolio{

width:100%;
height:100vh;

display:flex;

flex-direction:column;

align-items:center;

}



/* =====================
MENU SUPERIOR
===================== */


.nav{

position:absolute;

top:45px;

display:flex;

gap:55px;

opacity:0;

animation:fadeDown 1s ease forwards;

}



.nav a{

text-decoration:none;

color:#241F1F;

font-size:.95rem;

letter-spacing:.08em;

position:relative;

transition:.3s;

}



.nav a::after{

content:"";

position:absolute;

bottom:-8px;

left:0;

width:0;

height:2px;

background:#241F1F;

transition:.35s;

}



.nav a:hover::after{

width:100%;

}





/* =====================
TITULO
===================== */


.title{

margin-top:150px;

font-family:'Cormorant Garamond',serif;

font-size:clamp(4rem,8vw,7rem);

font-weight:500;

letter-spacing:.04em;

opacity:0;

animation:fadeUp 1.2s ease .3s forwards;

}





/* =====================
BLOQUE PRINCIPAL
===================== */


.presentation{


margin-top:35px;

width:70%;

display:flex;

align-items:center;

justify-content:center;

gap:45px;

opacity:0;

animation:fadeUp 1.2s ease .6s forwards;

}



/* Imagen */


.presentation img{


width:280px;

height:350px;

object-fit:cover;

display:block;

animation:imageMove 12s ease-in-out infinite alternate;

}



/* Nombre */


.name{


font-family:'Cormorant Garamond',serif;

font-size:clamp(2rem,3vw,3.5rem);

font-weight:500;

max-width:400px;

}





/* =====================
LINAUM
===================== */


.alias{


position:absolute;

bottom:45px;


font-size:1rem;

letter-spacing:.45em;

text-transform:uppercase;

color:#241F1F;


opacity:0;

animation:fadeUp 1.2s ease 1s forwards;


}



/* =====================
ANIMACIONES
===================== */


@keyframes fadeUp{


from{

opacity:0;

transform:translateY(30px);

}


to{

opacity:1;

transform:translateY(0);

}


}



@keyframes fadeDown{


from{

opacity:0;

transform:translateY(-20px);

}


to{

opacity:1;

transform:translateY(0);

}


}



@keyframes imageMove{


from{

transform:scale(1);

}


to{

transform:scale(1.03);

}


}




/* =====================
CELULAR
===================== */


@media(max-width:700px){


.nav{

gap:18px;

top:25px;

flex-wrap:wrap;

justify-content:center;

padding:0 20px;

}



.title{

margin-top:130px;

font-size:4rem;

}



.presentation{

width:90%;

flex-direction:column;

gap:25px;

}



.presentation img{

width:220px;

height:280px;

}



.name{

text-align:center;

font-size:2rem;

}



}



</style>

</head>



<body>



<main class="portfolio">



<nav class="nav">


<a href="obras.html">Obras</a>

<a href="exposiciones.html">Exposiciones</a>

<a href="estudios.html">Estudios</a>

<a href="artista.html">Artista</a>


</nav>




<h1 class="title">

PORTAFOLIO

</h1>




<section class="presentation">


<img src="portada.png" alt="Portada Catalina Ulloa Mujica">



<h2 class="name">

Catalina Ulloa Mujica

</h2>



</section>




<p class="alias">

Linaum

</p>



</main>



</body>

</html>
